name: Daily Render Keep-Alive / Bus Generator

on:
  schedule:
    # Runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI for testing

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API
        run: |
          curl -X POST https://havan-bus-booking-engine.onrender.com/api/internal/generate-buses/ \
          -H "Authorization: Bearer ${{ secrets.RENDER_CRON_SECRET }}" \
          -H "Content-Type: application/json"